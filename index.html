<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zine Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
    }
h1 { font-size: 3.5rem; margin-bottom: 24px; }

body { margin: 80px; font-family: system-ui, sans-serif; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 120px;
      justify-items: center;
    }
    .grid img {
      width: 140px;
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>

<script>
fetch("data/zines.json")
  .then(r => r.json())
  .then(zines => {
    const grid = document.querySelector(".grid");
    const search = document.getElementById("search");

    function render(list) {
      grid.innerHTML = "";
      list.forEach(z => {
        const a = document.createElement("a");
        a.href = "https://raw.githubusercontent.com/HannahNT123/library_zines/main/" + z.pdf;
        const img = document.createElement("img");
        img.src = "https://raw.githubusercontent.com/HannahNT123/library_zines/main/" + z.cover;
        a.appendChild(img);
        grid.appendChild(a);
      });
    }

    render(zines);

    search.addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      const filtered = zines.filter(z =>
        z.tags.some(t => t.toLowerCase().includes(q))
      );
      render(filtered);
    });
  });
</script>
