<h1>Contribute a Zine</h1>

<p>
This library welcomes contributions of zines about libraries, librarians,
and librarianship.
</p>

<p>
To contribute, add a folder containing:
<ul>
  <li>The zine PDF</li>
  <li>A cover image</li>
  <li>A metadata.yaml file with title and tags</li>
</ul>
Then submit a pull request on GitHub.
</p>
