<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Zines About Libraries, Librarians, and Librarianship</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 80px;
      font-family: system-ui, sans-serif;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 1.3rem;
      margin-bottom: 80px; /* space before layout */
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 80px;
      align-items: start;
    }

    .tags {
      position: sticky;
      top: 40px;
    }

    .tags h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
    }

    .tags button {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1px solid #333;
      background: white;
    }

    .tags button.active {
      background: #333;
      color: white;
    }

    .grid {
      margin-top: 32px; /* aligns grid top with "Filter by tag" */
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 120px;
      justify-items: center;
    }

    .grid img {
      width: 140px;
      height: 200px;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>

<h1>Zines About Libraries, Librarians, and Librarianship</h1>
<p><a href="about.html">About this project</a></p>


<p class="subtitle">
  🔍 Search for zines using the tags provided. &nbsp;&nbsp;
  🚀 Click on a cover to download the zine.
</p>

<div class="layout">
  <div class="tags" id="tags">
    <h2>Filter by tag</h2>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
fetch("data/zines.json")
  .then(r => r.json())
  .then(zines => {
    const grid = document.getElementById("grid");
    const tagBox = document.getElementById("tags");
    const activeTags = new Set();

    function render(list) {
      grid.innerHTML = "";
      list.forEach(z => {
        const a = document.createElement("a");
        a.href = "https://raw.githubusercontent.com/HannahNT123/library_zines/main/" + z.pdf;

        const img = document.createElement("img");
        img.src = "https://raw.githubusercontent.com/HannahNT123/library_zines/main/" + z.cover;

        a.appendChild(img);
        grid.appendChild(a);
      });
    }

    function applyFilters() {
      if (activeTags.size === 0) {
        render(zines);
        return;
      }

      const filtered = zines.filter(z =>
        [...activeTags].every(t => z.tags.includes(t))
      );

      render(filtered);
    }

    // initial render
    render(zines);

    // build tag buttons (ignore empty tags)
    const tags = [...new Set(
      zines.flatMap(z => z.tags).filter(t => t && t.trim())
    )].sort();

    const reset = document.createElement("button");
    reset.textContent = "Show all";
    reset.onclick = () => {
      activeTags.clear();
      document.querySelectorAll(".tags button").forEach(b => b.classList.remove("active"));
      render(zines);
    };
    tagBox.appendChild(reset);

    tags.forEach(tag => {
      const b = document.createElement("button");
      b.textContent = tag;

      b.onclick = () => {
        if (activeTags.has(tag)) {
          activeTags.delete(tag);
          b.classList.remove("active");
        } else {
          activeTags.add(tag);
          b.classList.add("active");
        }
        applyFilters();
      };

      tagBox.appendChild(b);
    });
  });
</script>

</body>
</html>
